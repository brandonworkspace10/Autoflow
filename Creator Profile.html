<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Creator — Autoflow</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.5.0/dist/tabler-icons.min.css" />

<script>
  (function () {
    try {
      if (!localStorage.getItem('autoflow.themeVersion')) {
        localStorage.removeItem('autoflow.theme');
        localStorage.setItem('autoflow.themeVersion', '2');
      }
      const saved = localStorage.getItem('autoflow.theme');
      if (saved) document.documentElement.setAttribute('data-theme', saved);
    } catch (e) {}
  })();
</script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --color-background-primary: #ffffff;
    --color-background-secondary: #f6f5f1;
    --color-background-tertiary: #efece4;
    --color-text-primary: #1a1a1a;
    --color-text-secondary: #6b6760;
    --color-text-tertiary: #9a958c;
    --color-border-primary: #d8d4cb;
    --color-border-secondary: #e3dfd6;
    --color-border-tertiary: #ece8df;
    --accent: #FF4D00;
    --accent-soft: rgba(255, 77, 0, 0.08);
    --accent2: #0066FF;
    --ink: #1a1a1a;
    --on-ink: #ffffff;
    --shadow-card-color: rgba(20, 18, 14, 0.04);
    --shadow-hover-color: rgba(20, 18, 14, 0.06);
  }
  [data-theme="dark"] {
    --color-background-primary: #14110d;
    --color-background-secondary: #1c1814;
    --color-background-tertiary: #24201a;
    --color-text-primary: #f6f4ef;
    --color-text-secondary: #a09a8e;
    --color-text-tertiary: #6b6760;
    --color-border-primary: #3a342c;
    --color-border-secondary: #2a251f;
    --color-border-tertiary: #221e18;
    --accent-soft: rgba(255, 77, 0, 0.14);
    --ink: #f6f4ef;
    --on-ink: #14110d;
    --shadow-card-color: rgba(0, 0, 0, 0.4);
    --shadow-hover-color: rgba(0, 0, 0, 0.5);
  }
  :root {
    --serif: 'Instrument Serif', 'Times New Roman', serif;
    --sans: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    --shadow-card: 0 1px 0 var(--shadow-card-color), 0 1px 2px var(--shadow-card-color);
    --shadow-hover: 0 4px 14px var(--shadow-hover-color), 0 1px 2px var(--shadow-card-color);
  }

  html, body { background: var(--color-background-primary); }
  body {
    font-family: var(--sans);
    color: var(--color-text-primary);
    -webkit-font-smoothing: antialiased;
    transition: background 0.25s ease, color 0.25s ease;
  }
  a { color: inherit; text-decoration: none; }

  .page { max-width: 1320px; margin: 0 auto; background: var(--color-background-primary); }

  /* Nav */
  .nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.1rem 2.25rem;
    border-bottom: 0.5px solid var(--color-border-tertiary);
    background: var(--color-background-primary);
    position: sticky; top: 0; z-index: 10;
  }
  .logo { font-family: var(--serif); font-size: 24px; letter-spacing: -0.5px; cursor: pointer; }
  .logo span { color: var(--accent); font-style: italic; }
  .nav-links { display: flex; gap: 28px; font-size: 13px; color: var(--color-text-secondary); list-style: none; }
  .nav-links li { cursor: pointer; transition: color 0.15s; }
  .nav-links li:hover { color: var(--color-text-primary); }
  .nav-right { display: flex; gap: 10px; }
  .btn-ghost {
    font-size: 13px; padding: 7px 16px;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: 999px; background: transparent;
    color: var(--color-text-primary); cursor: pointer;
  }
  .btn-ghost:hover { background: var(--color-background-secondary); border-color: var(--color-border-primary); }
  .btn-solid {
    font-size: 13px; font-weight: 500; padding: 7px 16px;
    border: none; border-radius: 999px;
    background: var(--ink); color: var(--on-ink); cursor: pointer;
  }
  .btn-solid:hover { filter: brightness(1.15); }

  /* Crumbs */
  .crumbs {
    padding: 1.5rem 2.25rem 0;
    font-size: 11px; color: var(--color-text-tertiary);
    letter-spacing: 0.06em; text-transform: uppercase;
  }
  .crumbs a:hover { color: var(--color-text-primary); }
  .crumbs .sep { margin: 0 8px; opacity: 0.5; }

  /* ----- Hero / profile header ----- */
  .profile-hero {
    padding: 2rem 2.25rem 0;
    border-bottom: 0.5px solid var(--color-border-tertiary);
  }
  .profile-cover {
    height: 160px;
    border-radius: 18px;
    position: relative;
    overflow: hidden;
    margin-bottom: -52px;
  }
  .profile-row {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 1.5rem;
    align-items: flex-end;
    padding: 0 0.5rem 2rem;
  }
  .profile-avatar {
    width: 104px; height: 104px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 600; font-size: 38px;
    letter-spacing: -0.8px;
    border: 4px solid var(--color-background-primary);
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    flex-shrink: 0;
  }
  .profile-name-block { padding-bottom: 4px; }
  .tier-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 10px; padding: 4px 10px; border-radius: 999px;
    font-weight: 500; margin-bottom: 8px;
  }
  .tier-top { background: var(--accent-soft); color: var(--accent); }
  .tier-verified { background: rgba(0,102,255,0.10); color: var(--accent2); }
  .tier-new { background: rgba(22,163,74,0.10); color: #15803d; }
  [data-theme="dark"] .tier-new { color: #4ade80; }
  .profile-name {
    font-family: var(--serif); font-size: 48px;
    letter-spacing: -1.4px; line-height: 1;
    color: var(--color-text-primary);
  }
  .profile-handle {
    margin-top: 6px;
    font-size: 13px; color: var(--color-text-secondary);
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .profile-handle .sep { color: var(--color-border-primary); }
  .profile-handle i { font-size: 13px; }
  .profile-actions { display: flex; gap: 8px; padding-bottom: 4px; }
  .btn-follow {
    font-size: 13px; font-weight: 500; padding: 10px 22px;
    border-radius: 999px; background: var(--ink); color: var(--on-ink);
    border: none; cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
    transition: transform 0.12s, filter 0.15s;
  }
  .btn-follow:hover { filter: brightness(1.15); transform: translateY(-1px); }
  .btn-follow.following { background: transparent; border: 0.5px solid var(--color-border-primary); color: var(--color-text-primary); }
  .btn-icon {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 0.5px solid var(--color-border-primary);
    background: var(--color-background-primary); color: var(--color-text-primary);
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .btn-icon:hover { background: var(--color-background-secondary); }

  .profile-bio {
    margin: 1rem 0 1.5rem;
    font-size: 15px; color: var(--color-text-secondary);
    line-height: 1.55; max-width: 640px;
    text-wrap: pretty;
  }

  .profile-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    border-top: 0.5px solid var(--color-border-tertiary);
    margin: 0 -2.25rem;
    padding: 0 2.25rem;
  }
  .ps-item {
    padding: 1.25rem 1.5rem;
    border-right: 0.5px solid var(--color-border-tertiary);
  }
  .ps-item:first-child { padding-left: 0; }
  .ps-item:last-child { padding-right: 0; border-right: none; }
  .ps-value {
    font-family: var(--serif); font-size: 32px;
    color: var(--color-text-primary); letter-spacing: -1px; line-height: 1;
  }
  .ps-value em { font-style: italic; color: var(--accent); }
  .ps-value .star { color: #f59e0b; }
  .ps-label {
    font-size: 11px; color: var(--color-text-tertiary);
    letter-spacing: 0.06em; text-transform: uppercase;
    margin-top: 6px;
  }

  /* ----- Tabs ----- */
  .tabs {
    display: flex; gap: 24px;
    padding: 0 2.25rem;
    border-bottom: 0.5px solid var(--color-border-tertiary);
    background: var(--color-background-primary);
    position: sticky; top: 65px; z-index: 5;
  }
  .tab {
    padding: 14px 0;
    font-size: 13px; font-weight: 500;
    color: var(--color-text-secondary);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    display: inline-flex; align-items: center; gap: 6px;
    transition: color 0.15s;
  }
  .tab:hover { color: var(--color-text-primary); }
  .tab.active {
    color: var(--color-text-primary);
    border-bottom-color: var(--accent);
  }
  .tab .count {
    font-size: 11px;
    padding: 2px 7px; border-radius: 999px;
    background: var(--color-background-secondary);
    color: var(--color-text-secondary);
    font-weight: 400;
  }

  /* ----- Body ----- */
  .body {
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 3rem;
    padding: 2rem 2.25rem 3rem;
  }
  .main { min-height: 400px; }
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  .section-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 1.25rem;
  }
  .section-head h2 {
    font-family: var(--serif); font-size: 26px;
    letter-spacing: -0.8px; color: var(--color-text-primary);
  }
  .section-head h2 em { font-style: italic; color: var(--accent); }
  .pinned-strip {
    margin-bottom: 1.5rem;
    padding: 1.5rem;
    border-radius: 16px;
    border: 0.5px solid var(--color-border-secondary);
    background:
      radial-gradient(120% 100% at 0% 0%, rgba(255,77,0,0.06) 0%, transparent 50%),
      var(--color-background-secondary);
    display: grid; grid-template-columns: auto 1fr auto; gap: 1.5rem; align-items: center;
  }
  .ps-eyebrow {
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .ps-title { font-family: var(--serif); font-size: 26px; letter-spacing: -0.6px; line-height: 1.1; color: var(--color-text-primary); margin-bottom: 6px; }
  .ps-desc { font-size: 13px; color: var(--color-text-secondary); max-width: 480px; line-height: 1.5; }
  .ps-icon-big {
    width: 64px; height: 64px; border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
  }
  .ps-icon-big i { font-size: 30px; }
  .ps-price {
    font-family: var(--serif); font-size: 32px;
    letter-spacing: -0.8px; line-height: 1;
    color: var(--color-text-primary);
    text-align: right;
  }
  .ps-price.free { color: #16a34a; }
  [data-theme="dark"] .ps-price.free { color: #4ade80; }
  .ps-cta {
    margin-top: 8px;
    font-size: 12px; padding: 7px 16px;
    border-radius: 999px; background: var(--ink); color: var(--on-ink);
    border: none; cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
    transition: filter 0.15s;
  }
  .ps-cta:hover { filter: brightness(1.15); }

  /* Workflow grid */
  .wf-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px;
  }
  .wf-card {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-secondary);
    border-radius: 14px;
    padding: 1.25rem;
    transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
    display: flex; flex-direction: column;
  }
  .wf-card:hover {
    border-color: var(--color-border-primary);
    box-shadow: var(--shadow-hover);
    transform: translateY(-1px);
  }
  .wf-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
  .wf-icon-wrap {
    width: 42px; height: 42px; border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
  }
  .wf-icon-wrap i { font-size: 20px; }
  .wf-badge { font-size: 10px; font-weight: 500; padding: 3px 9px; border-radius: 999px; }
  .badge-free { background: rgba(22,163,74,0.10); color: #15803d; }
  .badge-pro  { background: rgba(255,77,0,0.10); color: var(--accent); }
  .badge-new  { background: rgba(0,102,255,0.10); color: var(--accent2); }
  [data-theme="dark"] .badge-free { color: #4ade80; }
  .wf-cat { font-size: 10px; color: var(--color-text-tertiary); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px; }
  .wf-title { font-size: 14px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 6px; line-height: 1.3; text-wrap: balance; }
  .wf-desc { font-size: 12px; color: var(--color-text-secondary); line-height: 1.5; margin-bottom: 14px; flex: 1; }
  .wf-footer {
    display: flex; justify-content: space-between; align-items: center;
    padding-top: 12px; border-top: 0.5px solid var(--color-border-tertiary);
  }
  .wf-meta { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--color-text-secondary); }
  .wf-rating { display: inline-flex; align-items: center; gap: 2px; }
  .wf-rating i { font-size: 10px; color: #f59e0b; }
  .wf-price {
    font-size: 14px; font-weight: 500;
    color: var(--color-text-primary);
    font-family: var(--serif); letter-spacing: -0.3px;
  }
  .wf-price.free { color: #16a34a; }
  [data-theme="dark"] .wf-price.free { color: #4ade80; }

  /* About pane */
  .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
  .about-card {
    padding: 1.5rem;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: 14px;
    background: var(--color-background-primary);
  }
  .about-card h3 {
    font-family: var(--serif); font-size: 20px;
    letter-spacing: -0.5px; margin-bottom: 0.75rem;
    color: var(--color-text-primary);
  }
  .about-card p { font-size: 13.5px; color: var(--color-text-secondary); line-height: 1.6; }
  .timeline { display: flex; flex-direction: column; gap: 12px; }
  .timeline-item { display: flex; gap: 12px; }
  .timeline-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    margin-top: 6px; flex-shrink: 0;
    position: relative;
  }
  .timeline-dot::after {
    content: ''; position: absolute;
    top: 12px; left: 3.5px;
    width: 1px; height: 28px;
    background: var(--color-border-tertiary);
  }
  .timeline-item:last-child .timeline-dot::after { display: none; }
  .timeline-content { flex: 1; }
  .timeline-year { font-size: 11px; color: var(--color-text-tertiary); letter-spacing: 0.04em; }
  .timeline-text { font-size: 13.5px; color: var(--color-text-primary); margin-top: 2px; }

  /* Reviews */
  .reviews { display: flex; flex-direction: column; gap: 12px; }
  .review {
    padding: 1.25rem;
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: 14px;
    background: var(--color-background-primary);
  }
  .review-head { display: flex; align-items: center; gap: 12px; margin-bottom: 0.6rem; }
  .review-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 600; font-size: 13px;
  }
  .review-name { font-size: 13px; font-weight: 500; }
  .review-date { font-size: 11px; color: var(--color-text-tertiary); margin-top: 1px; }
  .review-stars { margin-left: auto; display: flex; gap: 1px; color: #f59e0b; font-size: 12px; }
  .review-flow {
    font-size: 11px; color: var(--color-text-tertiary);
    margin-bottom: 6px;
  }
  .review-flow span { color: var(--color-text-secondary); }
  .review-body { font-size: 13.5px; color: var(--color-text-secondary); line-height: 1.55; }

  /* Sidebar */
  .sidebar {
    align-self: start; position: sticky; top: 130px;
    display: flex; flex-direction: column; gap: 1rem;
  }
  .sb-card {
    padding: 1.25rem;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: 14px;
    background: var(--color-background-primary);
  }
  .sb-title {
    font-size: 11px; color: var(--color-text-tertiary);
    letter-spacing: 0.06em; text-transform: uppercase;
    margin-bottom: 0.75rem;
  }
  .sb-list { display: flex; flex-direction: column; gap: 8px; }
  .sb-row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12.5px; padding: 6px 0;
    border-bottom: 0.5px solid var(--color-border-tertiary);
  }
  .sb-row:last-child { border-bottom: none; }
  .sb-row .k { color: var(--color-text-secondary); }
  .sb-row .v { color: var(--color-text-primary); font-weight: 500; }
  .sb-tools { display: flex; gap: 4px; flex-wrap: wrap; }
  .sb-tool {
    font-size: 11px; padding: 3px 9px; border-radius: 999px;
    background: var(--color-background-secondary);
    color: var(--color-text-secondary);
  }

  /* Other creators */
  .other-creator {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0;
    border-bottom: 0.5px solid var(--color-border-tertiary);
    cursor: pointer;
    transition: opacity 0.12s;
  }
  .other-creator:last-child { border-bottom: none; }
  .other-creator:hover { opacity: 0.85; }
  .other-av {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 600; font-size: 11px;
    flex-shrink: 0;
  }
  .other-name { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
  .other-meta { font-size: 11px; color: var(--color-text-tertiary); margin-top: 1px; }

  /* Footer */
  .footer {
    padding: 1.5rem 2.25rem;
    border-top: 0.5px solid var(--color-border-tertiary);
    display: flex; justify-content: space-between; align-items: center;
    font-size: 11px; color: var(--color-text-tertiary);
  }
  .footer-links { display: flex; gap: 18px; }
  .footer-links a { color: var(--color-text-tertiary); cursor: pointer; }
  .footer-links a:hover { color: var(--color-text-primary); }

  @media (max-width: 980px) {
    .body { grid-template-columns: 1fr; gap: 2rem; }
    .sidebar { position: static; }
    .wf-grid, .about-grid { grid-template-columns: 1fr; }
    .profile-row { grid-template-columns: 1fr; gap: 1rem; }
    .profile-stats { grid-template-columns: repeat(2, 1fr); }
    .ps-item:nth-child(2) { border-right: none; }
    .ps-item:nth-child(-n+2) { border-bottom: 0.5px solid var(--color-border-tertiary); }
    .pinned-strip { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="page">
  <nav class="nav">
    <a class="logo" href="Autoflow Marketplace.html">Auto<span>flow</span></a>
    <ul class="nav-links">
      <li><a href="Browse Workflows.html">Browse</a></li>
      <li><a href="Creators.html">Creators</a></li>
      <li>Pricing</li>
      <li>Blog</li>
    </ul>
    <div class="nav-right">
      <button class="btn-ghost">Sign in</button>
      <button class="btn-solid">Get started</button>
    </div>
  </nav>

  <div class="crumbs" id="crumbs"></div>

  <section class="profile-hero">
    <div class="profile-cover" id="profile-cover"></div>
    <div class="profile-row">
      <div class="profile-avatar" id="profile-avatar"></div>
      <div class="profile-name-block">
        <div id="tier-badge"></div>
        <div class="profile-name" id="profile-name"></div>
        <div class="profile-handle" id="profile-handle"></div>
      </div>
      <div class="profile-actions">
        <button class="btn-follow" id="follow-btn"><i class="ti ti-plus"></i> Follow</button>
        <button class="btn-icon" title="Share"><i class="ti ti-share"></i></button>
        <button class="btn-icon" title="Message"><i class="ti ti-mail"></i></button>
      </div>
    </div>
    <div class="profile-bio" id="profile-bio"></div>
    <div class="profile-stats" id="profile-stats"></div>
  </section>

  <nav class="tabs">
    <div class="tab active" data-tab="workflows">Workflows <span class="count" id="tab-wf-count">0</span></div>
    <div class="tab" data-tab="about">About</div>
    <div class="tab" data-tab="reviews">Reviews <span class="count" id="tab-rv-count">0</span></div>
  </nav>

  <div class="body">
    <main class="main">
      <div class="tab-pane active" data-pane="workflows">
        <div class="pinned-strip" id="pinned"></div>
        <div class="section-head">
          <h2>All <em>workflows</em></h2>
        </div>
        <div class="wf-grid" id="wf-grid"></div>
      </div>

      <div class="tab-pane" data-pane="about">
        <div class="about-grid">
          <div class="about-card">
            <h3>Background</h3>
            <p id="about-bg"></p>
          </div>
          <div class="about-card">
            <h3>How I work</h3>
